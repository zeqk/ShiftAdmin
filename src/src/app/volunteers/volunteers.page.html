<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Voluntarios</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Voluntarios</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-list>
      <ng-container *ngIf="(volunteers$ | async) as volunteers">
        <ion-item *ngFor="let volunteer of volunteers" (click)="openEditVolunteerModal(volunteer)">
          <ion-label>
            Nombre: {{ volunteer.name }}
          </ion-label>
        </ion-item>
        <ion-item *ngIf="volunteers.length === 0">
          <ion-label>No hay voluntarios por el momento</ion-label>
        </ion-item>
      </ng-container>
  </ion-list>
  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="openAddVolunteerModal()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
