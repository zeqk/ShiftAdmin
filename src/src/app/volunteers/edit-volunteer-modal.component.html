<ion-header>
  <ion-toolbar>
    <ion-title>Editar Voluntario</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">Cerrar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-item>
    <ion-label position="floating">Nombre</ion-label>
    <ion-input type="text" [(ngModel)]="name"></ion-input>
  </ion-item>
  <ion-button expand="block" color="primary" (click)="save()">Guardar cambios</ion-button>
  <ion-button expand="block" color="danger" (click)="delete()">Eliminar caja</ion-button>
</ion-content>
